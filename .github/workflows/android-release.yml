name: Release APKScout

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      ANDROID_KEYSTORE_PATH: release.keystore
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check signing secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          test -n "${ANDROID_KEYSTORE_PASSWORD}"
          test -n "${ANDROID_KEY_ALIAS}"
          test -n "${ANDROID_KEY_PASSWORD}"

      - name: Restore keystore
        run: |
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Use preinstalled Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          ls -la "$ANDROID_HOME" || true
          ls -la "$ANDROID_HOME/cmdline-tools/latest/bin" || true

      - name: Ensure Android SDK packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found"
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" || true

          if [ ! -d "$ANDROID_HOME/platforms/android-36" ]; then
            echo "Missing Android platform android-36"
            exit 1
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1

      - name: Build signed release APK
        run: gradle :app:assembleRelease --no-daemon

      - name: Prepare release asset
        run: |
          mkdir -p dist
          APK_PATH="$(find app/build/outputs/apk/release -maxdepth 1 -name '*.apk' | head -n 1)"
          test -n "$APK_PATH"
          cp "$APK_PATH" "dist/APKScout-${GITHUB_REF_NAME}.apk"
          ls -la dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: APKScout ${{ github.ref_name }}
          files: dist/APKScout-${{ github.ref_name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
